Description: >
  RealCloudCrossAccount - This template creates a cross-account IAM role
  that grants RealCloud access to billing, cost management, and billing-related
  configuration features in your AWS account.

Parameters:
  TrustedAccount:
    Type: String
    Default: "835950600873"
    Description: "RealCloud Account ID for Cross-Account-Role"
  ExternalId:
    Type: String
    Default: ""
    Description: "External ID for Cross-Account-Role (Optional for console access)"
  ClientName:
    Type: String
    Default: "MyCompany-AWS"
    Description: "Identification name for this account in the RealCloud dashboard"

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Cross-Account Role Configuration. *Do Not Modify*"
        Parameters:
          - TrustedAccount
          - ExternalId
          - ClientName
    ParameterLabels:
      TrustedAccount:
        default: "AWS Account ID to Grant Permission"
      ExternalId:
        default: "External ID"
      ClientName:
        default: "Friendly Client Name"

Resources:
  RealCloudCrossAccountRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: RealCloudCrossAccount
      Path: "/"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: sts:AssumeRole
            Principal:
              AWS: "arn:aws:iam::835950600873:root"
      Policies:
        - PolicyName: Billing-Access-RealCloud
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  # ==========================================
                  # 💰 FATURAMENTO E CUSTOS 
                  # ==========================================
                  - "account:GetAccountInformation"
                  - "billing:Get*"
                  - "billing:List*"
                  - "budgets:ViewBudget"
                  - "budgets:Describe*"
                  - "cur:Get*"
                  - "cur:Describe*"
                  - "ce:Get*"
                  - "ce:Describe*"
                  - "ce:List*"
                  - "invoicing:Get*"
                  - "invoicing:List*"
                  - "payments:Get*"
                  - "payments:List*"
                  - "purchase-orders:GetPurchaseOrder"
                  - "purchase-orders:ViewPurchaseOrders"
                  - "pricing:DescribeServices"
                  - "freetier:GetFreeTier*"
                  - "consolidatedbilling:GetAccountBillingRole"
                  - "consolidatedbilling:ListLinkedAccounts"
                  - "mapcredits:List*"
                  - "bcm-pricing-calculator:Get*"
                  - "bcm-pricing-calculator:List*"
                  - "bcm-recommended-actions:List*"
                  - "savingsplans:Describe*"
                  - "savingsplans:List*"

                  # ==========================================
                  # ⚙️ COMPUTAÇÃO E CONTAINERS 
                  # ==========================================
                  - "ec2:Describe*"
                  - "autoscaling:Describe*"
                  - "eks:Describe*"
                  - "lambda:Get*"
                  - "lambda:List*"

                  # ==========================================
                  # 🗄️ STORAGE E DATABASES 
                  # ==========================================
                  - "s3:Get*"
                  - "s3:List*"
                  - "rds:Describe*"
                  - "dynamodb:Describe*"
                  - "dynamodb:List*"

                  # ==========================================
                  # 📊 MONITORAMENTO E METRICAS
                  # ==========================================
                  - "cloudwatch:Get*"
                  - "cloudwatch:List*"
                  - "logs:Describe*"
                  - "logs:Get*"

                  # ==========================================
                  # 🛡️ GOVERNANÇA E SEGURANÇA 
                  # ==========================================
                  - "config:Describe*"
                  - "config:Get*"
                  - "securityhub:Get*"
                  - "securityhub:Describe*"
                  - "inspector2:List*"
                  - "inspector2:Get*"
                  - "tag:Get*"
                  - "servicequotas:Get*"
                  - "servicequotas:List*"
                  - "servicequotas:Describe*"

                  # ==========================================
                  # 🧠 OTIMIZAÇÃO E SUPORTE 
                  # ==========================================
                  - "compute-optimizer:Get*"
                  - "compute-optimizer:Describe*"
                  - "compute-optimizer:Export*"
                  - "cost-optimization-hub:List*"
                  - "trustedadvisor:Describe*"
                  - "trustedadvisor:List*"
                  - "trustedadvisor:View*"
                  - "support:Describe*"
                  - "organizations:Describe*"
                  - "organizations:List*"
                  - "servicecatalog:ListApplications"

                Resource: "*"

  NotifyCrossAccountOnboarding:
    Type: Custom::NotifyCrossAccount
    DependsOn: RealCloudCrossAccountRole
    Properties:
      ServiceToken: arn:aws:lambda:us-east-1:835950600873:function:cross-account
      ClientAccountId: !Ref AWS::AccountId
      RoleName: RealCloudCrossAccount
      ExternalId: !Ref ExternalId
      ClientName: !Ref ClientName
      StackName: !Ref AWS::StackName
